<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1322">
<title>Alexander's Connect 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0b1322; --surface:#16273f; --surface2:#1e3450; --bone:#f4ead6;
  --muted:#9fb2cc; --lime:#c6ff4a; --gold:#ffd24a;
  --blue:#2f86d8; --blue-lo:#1f63b0; --blue-hi:#8fdcff;
  --red:#ec4257;  --red-lo:#c92b43;  --red-hi:#ff9aa9;
  --display:'Space Grotesk', system-ui, sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; height:100%; }
body{
  font-family:var(--display); background:
    radial-gradient(1200px 700px at 50% -10%, #16243c 0%, var(--ink) 60%) fixed,
    var(--ink);
  color:var(--bone); position:fixed; inset:0; overflow:hidden;
}
#app{
  position:relative; height:100svh; height:100dvh; width:100%; max-width:560px; margin:0 auto;
  display:flex; flex-direction:column; overflow:hidden; touch-action:manipulation;
  user-select:none; -webkit-user-select:none;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ---------- screens ---------- */
.screen{ position:absolute; inset:0; display:flex; flex-direction:column;
  padding:clamp(20px,5vw,40px) clamp(20px,5vw,40px) calc(clamp(20px,5vw,34px) + env(safe-area-inset-bottom));
  opacity:0; transform:translateY(8px); pointer-events:none; transition:opacity .28s ease, transform .28s ease; }
.screen.active{ opacity:1; transform:none; pointer-events:auto; }

/* ---------- shared bits ---------- */
.eyebrow{ font-weight:600; letter-spacing:.26em; text-transform:uppercase; font-size:clamp(11px,3vw,13px);
  color:var(--muted); display:flex; align-items:center; gap:9px; justify-content:center; }
.dot{ width:11px; height:11px; border-radius:50%; display:inline-block; }
.dot.b{ background:radial-gradient(circle at 35% 30%, var(--blue-hi), var(--blue)); }
.dot.r{ background:radial-gradient(circle at 35% 30%, var(--red-hi), var(--red)); }
.btn{ font-family:var(--display); font-weight:700; font-size:clamp(17px,4.4vw,21px); color:var(--ink);
  background:var(--bone); border:none; border-radius:18px; padding:16px 20px; width:100%;
  cursor:pointer; box-shadow:0 6px 0 #b9ad94, 0 10px 22px #0007; transition:transform .06s, box-shadow .06s; }
.btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #b9ad94, 0 6px 14px #0007; }
.btn.ghost{ background:var(--surface2); color:var(--bone); box-shadow:inset 0 0 0 1.5px #ffffff1c; }
.btn.ghost:active{ transform:translateY(2px); }

/* ---------- home ---------- */
#home{ justify-content:center; align-items:center; text-align:center; gap:clamp(12px,2.4vh,20px); }
.title{ font-weight:700; line-height:.92; letter-spacing:-.03em; }
.title .small{ display:block; font-size:clamp(20px,6vw,30px); color:var(--muted); font-weight:600; letter-spacing:.01em; }
.title .big{ display:block; font-size:clamp(46px,15vw,84px); }
.title .big b{ color:var(--blue-hi); }
.title .big i{ color:var(--red-hi); font-style:normal; }
.alex{ width:clamp(96px,26vw,128px); height:clamp(96px,26vw,128px); border-radius:50%; object-fit:cover;
  box-shadow:0 0 0 4px var(--surface2), 0 10px 26px #0009; }
.cap{ color:var(--muted); font-weight:600; font-size:clamp(13px,3.6vw,15px); }
.menu{ width:100%; max-width:340px; display:flex; flex-direction:column; gap:11px; margin-top:4px; }
.diffs{ display:none; grid-template-columns:1fr 1fr 1fr; gap:9px; }
.diffs.show{ display:grid; }
.diff{ font-family:var(--display); font-weight:700; font-size:clamp(15px,4vw,18px); color:var(--ink);
  background:var(--bone); border:none; border-radius:14px; padding:14px 6px; cursor:pointer;
  box-shadow:0 5px 0 #b9ad94, 0 8px 16px #0006; transition:transform .06s, box-shadow .06s; }
.diff:active{ transform:translateY(3px); box-shadow:0 2px 0 #b9ad94; }
.diff .lvl{ display:block; font-size:.78em; }
.diff .em{ display:block; font-size:1.5em; line-height:1.1; }
.diff.easy{ background:#d8f6a8; } .diff.med{ background:var(--gold); } .diff.hard{ background:var(--red-hi); }

/* ---------- game top bar ---------- */
#game{ justify-content:flex-start; gap:clamp(10px,2vh,16px); }
.bar{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.iconbtn{ font-family:var(--display); font-weight:700; font-size:18px; color:var(--bone);
  background:var(--surface); border:none; border-radius:13px; width:46px; height:46px; cursor:pointer;
  box-shadow:inset 0 0 0 1.5px #ffffff14; display:flex; align-items:center; justify-content:center; }
.iconbtn:active{ transform:scale(.94); }
.barname{ font-weight:700; font-size:clamp(15px,4.4vw,19px); letter-spacing:.02em; }
.barname b{ color:var(--blue-hi); } .barname i{ color:var(--red-hi); font-style:normal; }

/* turn pill */
.turn{ display:flex; align-items:center; justify-content:center; gap:11px; font-weight:700;
  font-size:clamp(16px,4.6vw,20px); background:var(--surface); border-radius:16px; padding:11px 16px;
  box-shadow:inset 0 0 0 1.5px #ffffff10; min-height:52px; }
.turn .swatch{ width:24px; height:24px; border-radius:50%; box-shadow:inset 0 -2px 3px #0006, inset 0 2px 3px #ffffff80; }
.turn[data-p="1"] .swatch{ background:radial-gradient(circle at 35% 30%, var(--blue-hi), var(--blue) 62%, var(--blue-lo)); }
.turn[data-p="2"] .swatch{ background:radial-gradient(circle at 35% 30%, var(--red-hi), var(--red) 62%, var(--red-lo)); }
.turn .thinking{ display:inline-flex; gap:4px; }
.turn .thinking i{ width:6px; height:6px; border-radius:50%; background:var(--red-hi); animation:think 1s infinite ease-in-out; }
.turn .thinking i:nth-child(2){ animation-delay:.15s; } .turn .thinking i:nth-child(3){ animation-delay:.3s; }
@keyframes think{ 0%,100%{ opacity:.25; transform:translateY(0); } 50%{ opacity:1; transform:translateY(-3px); } }

/* ---------- board ---------- */
.boardwrap{ flex:1; display:flex; align-items:center; justify-content:center; min-height:0; }
.board{ position:relative; width:100%; max-width:min(94vw, 460px, calc((100svh - 210px) * 7 / 6));
  display:grid; grid-template-columns:repeat(7,1fr); gap:clamp(5px,1.5vw,10px);
  background:linear-gradient(180deg, var(--surface2), var(--surface)); padding:clamp(8px,2.4vw,15px);
  border-radius:clamp(16px,5vw,26px); overflow:hidden;
  box-shadow:0 16px 40px #000a, inset 0 0 0 1.5px #ffffff12, inset 0 2px 0 #ffffff10; }
.cell{ position:relative; aspect-ratio:1; cursor:pointer; }
.hole{ position:absolute; inset:clamp(4px,1.4vw,7px); border-radius:50%;
  background:radial-gradient(circle at 50% 38%, #0a1322, #0d1830);
  box-shadow:inset 0 3px 7px #000a, inset 0 -2px 3px #ffffff0a; }
.cell.hot .hole{ box-shadow:inset 0 3px 7px #000a, inset 0 0 0 2px #ffffff30; }
.disc{ position:absolute; inset:clamp(4px,1.4vw,7px); border-radius:50%; will-change:transform; }
.disc::after{ content:""; position:absolute; inset:14%; border-radius:50%; box-shadow:inset 0 0 0 2px #00000022; }
.disc.blue{ background:radial-gradient(circle at 35% 30%, var(--blue-hi), var(--blue) 60%, var(--blue-lo));
  box-shadow:inset 0 -4px 7px #00000055, inset 0 3px 5px #ffffff70, 0 2px 4px #0006; }
.disc.red{ background:radial-gradient(circle at 35% 30%, var(--red-hi), var(--red) 60%, var(--red-lo));
  box-shadow:inset 0 -4px 7px #00000055, inset 0 3px 5px #ffffff70, 0 2px 4px #0006; }
.disc.drop{ animation:drop .44s cubic-bezier(.34,.85,.42,1) both; }
@keyframes drop{
  0%{ transform:translateY(var(--fall)); }
  72%{ transform:translateY(0); }
  84%{ transform:translateY(-4%); }
  93%{ transform:translateY(0); }
  97%{ transform:translateY(-1.5%); }
  100%{ transform:translateY(0); }
}
.disc.win{ animation:winpulse .8s ease-in-out infinite alternate; z-index:2; }
@keyframes winpulse{ from{ box-shadow:inset 0 -4px 7px #00000055, inset 0 3px 5px #ffffff70, 0 0 0 3px #fff, 0 0 10px #fff6; }
  to{ box-shadow:inset 0 -4px 7px #00000055, inset 0 3px 5px #ffffff70, 0 0 0 4px #fff, 0 0 26px #ffffffcc; } }

/* ---------- result overlay ---------- */
.overlay{ position:absolute; inset:0; z-index:40; display:none; flex-direction:column; align-items:center;
  justify-content:center; gap:16px; text-align:center; padding:30px;
  background:radial-gradient(600px 400px at 50% 40%, #0b1322dd, #0b1322f2); backdrop-filter:blur(3px); }
.overlay.show{ display:flex; }
.result-emoji{ font-size:clamp(54px,18vw,86px); line-height:1; }
.result-title{ font-weight:700; font-size:clamp(26px,8vw,40px); letter-spacing:-.01em; }
.result-sub{ color:var(--muted); font-weight:600; font-size:clamp(14px,4vw,17px); margin-top:-6px; }
.overlay .menu{ margin-top:10px; }

#confetti{ position:absolute; inset:0; z-index:50; pointer-events:none; display:none; }
@media (min-width:600px){ #app{ height:96svh; margin-top:2svh; border-radius:34px;
  box-shadow:0 40px 120px #000a, inset 0 0 0 1px #ffffff0d; } }
</style>
</head>

<script>
(function(){
"use strict";
const $=id=>document.getElementById(id);
const app=$('app');
function show(n){ $('home').classList.toggle('active',n==='home'); $('game').classList.toggle('active',n==='game'); app.dataset.screen=n; }
const at=s=>app.dataset.screen===s;

/* ---------- confetti ---------- */
const cv=$('confetti'), ctx=cv.getContext('2d'); let parts=[], confRaf=null, confUntil=0;
function sizeCv(){ const r=app.getBoundingClientRect(); cv.width=r.width; cv.height=r.height; }
function burst(ms){
  sizeCv(); cv.style.display='block';
  const cols=['#2f86d8','#ec4257','#8fdcff','#ff9aa9','#ffd24a','#f4ead6'];
  for(let i=0;i<120;i++){ parts.push({ x:Math.random()*cv.width, y:-20-Math.random()*cv.height*0.4,
    vx:(Math.random()-.5)*1.7, vy:2+Math.random()*3.4, s:6+Math.random()*9,
    rot:Math.random()*6.28, vr:(Math.random()-.5)*0.34, c:cols[Math.floor(Math.random()*cols.length)] }); }
  confUntil=performance.now()+ms; if(!confRaf) confLoop();
}
function confLoop(){
  ctx.clearRect(0,0,cv.width,cv.height);
  for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.045; p.rot+=p.vr;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c;
    ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore(); }
  parts=parts.filter(p=>p.y<cv.height+40);
  if(performance.now()<confUntil || parts.length){ confRaf=requestAnimationFrame(confLoop); }
  else { confRaf=null; ctx.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; }
}
function stopConfetti(){ parts=[]; if(confRaf){ cancelAnimationFrame(confRaf); confRaf=null; } ctx.clearRect(0,0,cv.width,cv.height); cv.style.display='none'; }
window.addEventListener('resize', ()=>{ if(parts.length||confRaf) sizeCv(); });

/* ---------- game model ---------- */
const ROWS=6, COLS=7, HUMAN=1, CPU=2;
const other=p=>p===1?2:1;
let board, current, vsCpu=true, difficulty='medium', locked=false, over=false;

function emptyBoard(){ const b=[]; for(let r=0;r<ROWS;r++) b.push(new Array(COLS).fill(0)); return b; }
function dropRowB(b,c){ for(let r=ROWS-1;r>=0;r--) if(b[r][c]===0) return r; return -1; }
function boardFull(b){ for(let c=0;c<COLS;c++) if(b[0][c]===0) return false; return true; }
const inB=(r,c)=>r>=0&&r<ROWS&&c>=0&&c<COLS;
function win4(b,r,c,p){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){ let n=1;
    for(const s of [1,-1]){ let rr=r+dr*s, cc=c+dc*s;
      while(inB(rr,cc)&&b[rr][cc]===p){ n++; rr+=dr*s; cc+=dc*s; } }
    if(n>=4) return true; }
  return false;
}
function winLine(b,r,c,p){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(const [dr,dc] of dirs){ const line=[[r,c]];
    for(const s of [1,-1]){ let rr=r+dr*s, cc=c+dc*s;
      while(inB(rr,cc)&&b[rr][cc]===p){ line.push([rr,cc]); rr+=dr*s; cc+=dc*s; } }
    if(line.length>=4) return line; }
  return null;
}

/* ---------- AI ---------- */
const ORDER=[3,2,4,1,5,0,6];
const WINDOWS=(()=>{ const w=[]; const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) for(const [dr,dc] of dirs){
    const cells=[]; let ok=true;
    for(let k=0;k<4;k++){ const rr=r+dr*k, cc=c+dc*k; if(!inB(rr,cc)){ ok=false; break; } cells.push([rr,cc]); }
    if(ok) w.push(cells);
  } return w; })();
function evaluate(b,me){
  const opp=other(me); let s=0;
  for(let r=0;r<ROWS;r++){ if(b[r][3]===me) s+=3; else if(b[r][3]===opp) s-=3; }
  for(const win of WINDOWS){ let cp=0,co=0,ce=0;
    for(const [r,c] of win){ const v=b[r][c]; if(v===me)cp++; else if(v===opp)co++; else ce++; }
    if(cp===4) s+=10000; else if(cp===3&&ce===1) s+=60; else if(cp===2&&ce===2) s+=12;
    if(co===4) s-=10000; else if(co===3&&ce===1) s-=64; else if(co===2&&ce===2) s-=12;
  }
  return s;
}
let MAXD=6;
function minimax(b,depth,alpha,beta,cur,me){
  const valid=ORDER.filter(c=>b[0][c]===0);
  if(valid.length===0) return {score:0,col:-1};
  let bestCol=valid[0];
  if(cur===me){ let best=-Infinity;
    for(const c of valid){ const r=dropRowB(b,c); b[r][c]=cur; let sc;
      if(win4(b,r,c,cur)) sc=100000-(MAXD-depth);
      else if(depth===0) sc=evaluate(b,me);
      else sc=minimax(b,depth-1,alpha,beta,other(cur),me).score;
      b[r][c]=0;
      if(sc>best){ best=sc; bestCol=c; } if(best>alpha) alpha=best; if(alpha>=beta) break;
    }
    return {score:best,col:bestCol};
  } else { let best=Infinity;
    for(const c of valid){ const r=dropRowB(b,c); b[r][c]=cur; let sc;
      if(win4(b,r,c,cur)) sc=-100000+(MAXD-depth);
      else if(depth===0) sc=evaluate(b,me);
      else sc=minimax(b,depth-1,alpha,beta,other(cur),me).score;
      b[r][c]=0;
      if(sc<best){ best=sc; bestCol=c; } if(best<beta) beta=best; if(alpha>=beta) break;
    }
    return {score:best,col:bestCol};
  }
}
function easyMove(b,me,valid){
  for(const c of valid){ const r=dropRowB(b,c); b[r][c]=me; const w=win4(b,r,c,me); b[r][c]=0; if(w) return c; }
  const opp=other(me);
  if(Math.random()<0.55){ for(const c of valid){ const r=dropRowB(b,c); b[r][c]=opp; const w=win4(b,r,c,opp); b[r][c]=0; if(w) return c; } }
  const safe=valid.filter(c=>{ const r=dropRowB(b,c); b[r][c]=me; let bad=false; const r2=dropRowB(b,c);
    if(r2>=0){ b[r2][c]=opp; if(win4(b,r2,c,opp)) bad=true; b[r2][c]=0; } b[r][c]=0; return !bad; });
  const pool=(Math.random()<0.6 && safe.length)?safe:valid;
  if(Math.random()<0.4 && pool.includes(3)) return 3;
  return pool[Math.floor(Math.random()*pool.length)];
}
function chooseMove(b,me,diff){
  const valid=ORDER.filter(c=>b[0][c]===0);
  if(!valid.length) return -1;
  if(diff==='easy') return easyMove(b,me,valid);
  for(const c of valid){ const r=dropRowB(b,c); b[r][c]=me; const w=win4(b,r,c,me); b[r][c]=0; if(w) return c; }
  MAXD = diff==='hard'?6:4;
  const res=minimax(b,MAXD,-Infinity,Infinity,me,me);
  return res.col>=0?res.col:valid[0];
}

/* ---------- board DOM ---------- */
const boardEl=$('board'); let cells=[];
function buildBoard(){
  boardEl.innerHTML=''; cells=[];
  for(let r=0;r<ROWS;r++){ cells[r]=[];
    for(let c=0;c<COLS;c++){
      const cell=document.createElement('div'); cell.className='cell';
      const hole=document.createElement('div'); hole.className='hole'; cell.appendChild(hole);
      cell.addEventListener('click',()=>onColumn(c));
      cell.addEventListener('pointerenter',()=>hotCol(c));
      cell.addEventListener('pointerleave',()=>hotCol(-1));
      boardEl.appendChild(cell); cells[r][c]=cell;
    }
  }
}
function hotCol(c){
  for(let r=0;r<ROWS;r++) for(let cc=0;cc<COLS;cc++) cells[r][cc].classList.remove('hot');
  if(c<0||over||locked) return;
  if(vsCpu && current===CPU) return;
  if(board[0][c]!==0) return;
  for(let r=0;r<ROWS;r++) cells[r][c].classList.add('hot');
}
function placeDisc(r,c,p,cb){
  const cell=cells[r][c];
  const d=document.createElement('div'); d.className='disc '+(p===1?'blue':'red');
  cell.appendChild(d);
  const dist=cell.offsetTop+cell.offsetHeight+24;
  d.style.setProperty('--fall', (-dist)+'px');
  void d.offsetWidth;            // commit start position
  d.classList.add('drop');
  let done=false; const fin=()=>{ if(done) return; done=true; cb&&cb(d); };
  d.addEventListener('animationend', fin, {once:true});
  setTimeout(fin, 640);          // safety fallback
}

/* ---------- turn flow ---------- */
function onColumn(c){
  if(locked || over) return;
  if(vsCpu && current===CPU) return;
  dropInto(c);
}
function dropInto(c){
  if(board[0][c]!==0) return;
  hotCol(-1);
  const r=dropRowB(board,c); board[r][c]=current; locked=true;
  const mover=current;
  placeDisc(r,c,mover,()=>resolveAfter(r,c,mover));
}
function resolveAfter(r,c,p){
  const line=winLine(board,r,c,p);
  if(line){ over=true; line.forEach(([rr,cc])=>cells[rr][cc].querySelector('.disc').classList.add('win')); finish(p); return; }
  if(boardFull(board)){ over=true; finish(0); return; }
  current=other(p); updateTurn();
  if(vsCpu && current===CPU){ cpuMove(); } else { locked=false; }
}
function cpuMove(){
  locked=true; updateTurn();
  setTimeout(()=>{
    const c=chooseMove(board, CPU, difficulty);
    if(c<0){ over=true; finish(0); return; }
    const r=dropRowB(board,c); board[r][c]=CPU;
    placeDisc(r,c,CPU,()=>resolveAfter(r,c,CPU));
  }, 430);
}
function updateTurn(){
  const t=$('turn'), txt=$('turnText');
  t.dataset.p=current;
  if(vsCpu){
    if(current===HUMAN){ txt.textContent='Your turn, Alexander'; }
    else { txt.innerHTML='Computer is thinking <span class="thinking"><i></i><i></i><i></i></span>'; }
  } else {
    txt.textContent = current===1 ? "Blue's turn" : "Red's turn";
  }
}
function finish(winner){
  stopConfetti();
  const ov=$('overlay');
  if(winner===0){
    $('resEmoji').textContent='🤝'; $('resTitle').textContent="It's a tie!";
    $('resSub').textContent='The board is full — nobody connected four.';
  } else if(vsCpu){
    if(winner===HUMAN){ $('resEmoji').textContent='🏆'; $('resTitle').textContent='You win, Alexander!'; $('resSub').textContent='Four in a row — amazing!'; burst(2600); }
    else { $('resEmoji').textContent='🤖'; $('resTitle').textContent='Computer wins'; $('resSub').textContent='So close — tap Play again!'; }
  } else {
    const blue=winner===1;
    $('resEmoji').textContent='🎉'; $('resTitle').textContent=(blue?'Blue':'Red')+' wins!'; $('resSub').textContent='Four in a row!'; burst(2600);
  }
  ov.classList.add('show');
}

/* ---------- new game / wiring ---------- */
function newGame(){
  stopConfetti(); $('overlay').classList.remove('show');
  board=emptyBoard(); current=HUMAN; over=false; locked=false;
  buildBoard(); updateTurn(); show('game');
  $('barName').innerHTML = vsCpu ? ('Vs computer · <span style="color:var(--muted);text-transform:capitalize">'+difficulty+'</span>') : '<b>Two</b> players';
  // Blue (human / player 1) always starts, so the computer never opens.
}

$('vsCpuBtn').onclick=()=>{ if(!at('home')) return; $('diffs').classList.toggle('show'); };
document.querySelectorAll('.diff').forEach(b=>{ b.onclick=()=>{ if(!at('home')) return; vsCpu=true; difficulty=b.dataset.d; newGame(); }; });
$('vsHumanBtn').onclick=()=>{ if(!at('home')) return; vsCpu=false; newGame(); };
$('newBtn').onclick=()=>{ if(!at('game')) return; newGame(); };
$('homeBtn').onclick=()=>{ if(!at('game')) return; stopConfetti(); show('home'); };
$('againBtn').onclick=()=>{ newGame(); };
$('overHomeBtn').onclick=()=>{ stopConfetti(); $('overlay').classList.remove('show'); show('home'); };

buildBoard();
})();
</script>
