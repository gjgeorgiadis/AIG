<meta charset="utf-8">
<title>Alexander's Game Zone</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Game Zone">
<meta name="theme-color" content="#ffcf3f">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23ff5d5d'/%3E%3Ccircle cx='62' cy='96' r='12' fill='%23fff'/%3E%3Ccircle cx='118' cy='96' r='12' fill='%23fff'/%3E%3Crect x='80' y='56' width='20' height='64' rx='6' fill='%23fff'/%3E%3Crect x='58' y='84' width='64' height='20' rx='6' fill='%23fff'/%3E%3C/svg%3E">
<style>
  :root{ --ink:#23314f; --sun:#ffcf3f; --pop:#ff5d5d; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ min-height:100%; }
  body{
    font-family:-apple-system,"SF Pro Rounded",BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(165deg,#8fd3ff 0%, #c9f0ff 38%, #fff3c9 100%);
    background-attachment:fixed;
    padding:18px 16px 40px;
    -webkit-text-size-adjust:100%;
  }
  .wrap{ max-width:920px; margin:0 auto; }

  /* ---- Banner ---- */
  .banner{
    position:relative; border-radius:26px; overflow:hidden;
    min-height:168px; display:flex; align-items:flex-end;
    background:linear-gradient(135deg,#ff8fb1,#ffd36e 55%,#7ec8ff);
    box-shadow:0 12px 30px rgba(40,60,110,.22);
    border:4px solid #fff;
  }
  .banner img.hero{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .banner .scrim{ position:absolute; inset:0;
    background:linear-gradient(to top, rgba(20,28,55,.62) 0%, rgba(20,28,55,.12) 45%, rgba(20,28,55,0) 70%); }
  .banner .heading{ position:relative; padding:18px 22px; width:100%; }
  .banner.has-photo .heading h1, .banner.has-photo .heading p{ color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.45); }
  .banner .heading h1{ font-size:clamp(26px,7vw,46px); font-weight:900; letter-spacing:.5px; line-height:1.02; }
  .banner .heading p{ font-size:clamp(13px,3.4vw,18px); font-weight:700; margin-top:4px; opacity:.95; }
  .placeholder-note{ position:absolute; top:10px; right:14px; font-size:11px; font-weight:700;
    color:#fff; background:rgba(0,0,0,.28); padding:5px 10px; border-radius:999px; }

  /* ---- Grid ---- */
  .subhead{ text-align:center; font-weight:800; font-size:clamp(15px,4vw,20px);
    margin:22px 0 14px; color:#1b2a4a; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:760px; margin:0 auto; }
  @media (max-width:540px){ .grid{ grid-template-columns:1fr; } }
  .card .emoji svg{ display:block; }

  .card{
    position:relative; display:flex; flex-direction:column; text-decoration:none; color:inherit;
    background:#fff; border-radius:22px; padding:18px 18px 16px;
    box-shadow:0 8px 20px rgba(40,60,110,.16);
    border:3px solid #fff; transition:transform .12s ease, box-shadow .12s ease;
    min-height:188px;
  }
  .card.playable{ cursor:pointer; }
  .card.playable:hover{ transform:translateY(-4px); box-shadow:0 16px 30px rgba(40,60,110,.24); }
  .card.playable:active{ transform:translateY(-1px) scale(.99); }
  .card .accent{ position:absolute; top:0; left:22px; right:22px; height:7px; border-radius:0 0 8px 8px; }
  .card .emoji{ font-size:46px; line-height:1; margin:6px 0 8px; }
  .card h2{ font-size:21px; font-weight:900; }
  .card p{ font-size:13.5px; font-weight:600; color:#56607a; margin-top:6px; flex:1; }
  .play{
    margin-top:12px; align-self:flex-start; font-weight:900; font-size:16px; color:#fff;
    padding:10px 20px; border-radius:999px; box-shadow:0 5px 0 rgba(0,0,0,.12);
  }
  .card.playable:active .play{ box-shadow:0 2px 0 rgba(0,0,0,.12); transform:translateY(2px); }

  .card.soon{ background:rgba(255,255,255,.55); border:3px dashed #b9c6e0; box-shadow:none; }
  .card.soon .emoji{ filter:grayscale(.4); opacity:.7; }
  .card.soon h2{ color:#6b7691; }
  .badge{ align-self:flex-start; margin-top:12px; font-weight:800; font-size:13px; color:#6b7691;
    background:#e7edf8; padding:8px 16px; border-radius:999px; }

  footer{ text-align:center; margin-top:26px; font-size:12.5px; font-weight:700; color:#3a4a6a; opacity:.8; }
</style>
</head>
<body>
<div class="wrap">
  <div id="banner" class="banner"></div>
  <div class="subhead">Pick a game to play! 🎮</div>
  <div id="grid" class="grid"></div>
  <footer>Made for Alexander 🏗️ • more games coming soon</footer>
</div>

        '<p>'+g.desc+'</p>'+
        '<span class="play" style="background:'+g.color+'">PLAY ▶</span>';
      grid.appendChild(a);
    } else {
      const d=document.createElement("div");
      d.className="card soon";
      d.innerHTML =
        '<span class="accent" style="background:#c3cee2"></span>'+
        '<div class="emoji">'+(g.svg||g.emoji)+'</div>'+
        '<h2>'+g.title+'</h2>'+
        '<p>'+g.desc+'</p>'+
        '<span class="badge">🔒 Coming soon</span>';
      grid.appendChild(d);
    }
  }
})();
</script>
</body>
</html>
