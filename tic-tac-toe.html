<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Alexander's Tic-Tac-Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --red: #ff4d5e;
    --red-deep: #e02f43;
    --blue: #2d8cff;
    --blue-deep: #1666d6;
    --ink: #2b2150;
    --paper: #fffdf7;
    --board: #6b4ee6;
    --board-deep: #5236c9;
    --sun: #ffd56b;
    --sky: #ffe9b0;
    --green: #2bd6a0;
    --cell: min(88vw, 56vh, 360px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    font-family: 'Nunito', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
    color: var(--ink);
    background: radial-gradient(120% 90% at 50% -10%, var(--sun) 0%, var(--sky) 45%, #fff6df 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding:
      max(env(safe-area-inset-top), 14px)
      max(env(safe-area-inset-right), 14px)
      max(env(safe-area-inset-bottom), 14px)
      max(env(safe-area-inset-left), 14px);
    text-align: center;
    -webkit-text-size-adjust: 100%;
  }

  h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(26px, 8vw, 40px);
    margin: 4px 0 0;
    line-height: 1.05;
    letter-spacing: 0.5px;
    color: var(--ink);
  }
  h1 .x { color: var(--red); }
  h1 .o { color: var(--blue); }
  .subtitle {
    font-size: clamp(13px, 3.6vw, 16px);
    font-weight: 700;
    color: #8a7fb8;
    margin: 2px 0 0;
  }

  .wrap {
    width: 100%;
    max-width: 460px;
    margin: auto 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(10px, 2.4vh, 18px);
  }

  .home { display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center; }
  .hero-photo {
    height: min(40vh, 300px);
    width: auto;
    max-width: 86vw;
    object-fit: contain;
    border-radius: 18px;
    border: 5px solid #fff;
    box-shadow: 0 8px 0 rgba(43,33,80,0.10), 0 14px 26px rgba(43,33,80,0.18);
    margin: 2px 0 4px;
    transform: rotate(-1.4deg);
  }
  .mode-btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: clamp(18px, 5vw, 22px);
    color: #fff;
    border: none;
    border-radius: 22px;
    padding: 18px 22px;
    width: min(86vw, 340px);
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: 0 7px 0 rgba(0,0,0,0.14), 0 12px 22px rgba(0,0,0,0.12);
    transition: transform .08s ease, box-shadow .08s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .mode-btn .emoji { font-size: 1.3em; }
  .mode-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.14), 0 6px 12px rgba(0,0,0,0.12); }
  .mode-friend { background: linear-gradient(180deg, #ff6a78, var(--red)); }
  .mode-cpu { background: linear-gradient(180deg, #4fa0ff, var(--blue)); }

  .home-hint { margin-top: 6px; font-weight: 800; color: #8a7fb8; font-size: 14px; }

  .status {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: clamp(18px, 5vw, 24px);
    padding: 9px 20px;
    border-radius: 999px;
    background: #fff;
    box-shadow: 0 5px 0 rgba(43,33,80,0.10), 0 10px 18px rgba(43,33,80,0.10);
    display: inline-flex;
    align-items: center;
    gap: 9px;
    min-height: 24px;
    transition: color .2s ease;
  }
  .status .dot { width: 16px; height: 16px; border-radius: 50%; display: inline-block; flex: none; }
  .status.turn-X { color: var(--red-deep); }
  .status.turn-X .dot { background: var(--red); }
  .status.turn-O { color: var(--blue-deep); }
  .status.turn-O .dot { background: var(--blue); }
  .status.win-X { color: var(--red-deep); }
  .status.win-O { color: var(--blue-deep); }
  .status.draw { color: #7a6fae; }
  .status.win-X .dot, .status.win-O .dot, .status.draw .dot { display: none; }

  .board {
    width: var(--cell);
    height: var(--cell);
    background: linear-gradient(180deg, var(--board), var(--board-deep));
    border-radius: 26px;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
    box-shadow: 0 10px 0 var(--board-deep), 0 20px 30px rgba(82,54,201,0.30);
    position: relative;
  }
  .board.locked { pointer-events: none; }

  .square {
    background: var(--paper);
    border: none;
    border-radius: 16px;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12%;
    box-shadow: inset 0 -5px 0 rgba(43,33,80,0.07);
    transition: transform .08s ease, background .2s ease;
  }
  .square:active { transform: scale(0.95); }
  .square:focus-visible { outline: 4px solid #fff; outline-offset: 2px; }
  .square svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .square.win { background: #fff7c2; animation: pop 0.5s ease infinite alternate; }
  @keyframes pop { from { transform: scale(1); } to { transform: scale(1.07); } }

  .mark-stroke { fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .mark-x .mark-stroke { stroke: var(--red); stroke-width: 13; }
  .mark-o .mark-stroke { stroke: var(--blue); stroke-width: 13; }
  .draw-anim { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw .26s ease forwards; }
  .draw-anim.delay { animation-delay: .14s; }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  .scores { display: flex; gap: 10px; width: var(--cell); justify-content: center; }
  .score-card {
    background: #fff;
    border-radius: 16px;
    padding: 8px 6px 9px;
    flex: 1;
    box-shadow: 0 4px 0 rgba(43,33,80,0.08);
    border-bottom: 4px solid transparent;
  }
  .score-card.red { border-bottom-color: var(--red); }
  .score-card.blue { border-bottom-color: var(--blue); }
  .score-card.tie { border-bottom-color: #c9bff0; }
  .score-label { font-size: 12px; font-weight: 800; color: #8a7fb8; }
  .score-label .who { display: block; }
  .score-num { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 26px; line-height: 1; margin-top: 2px; }
  .score-card.red .score-num { color: var(--red-deep); }
  .score-card.blue .score-num { color: var(--blue-deep); }
  .score-card.tie .score-num { color: #9a8fc8; }

  .controls { display: flex; gap: 10px; width: var(--cell); align-items: stretch; }
  .btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 16px;
    border: none;
    border-radius: 16px;
    padding: 12px 10px;
    cursor: pointer;
    touch-action: manipulation;
    color: #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,0.14);
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.14); }
  .btn-again { background: linear-gradient(180deg, #45e0ac, var(--green)); flex: 2; }
  .btn-home { background: linear-gradient(180deg, #b3a6ef, #8f7de8); flex: 1.4; }
  .btn-icon { background: #fff; color: var(--ink); flex: none; width: 52px; font-size: 22px; box-shadow: 0 5px 0 rgba(43,33,80,0.10); padding: 0; }
  .btn-icon:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(43,33,80,0.10); }

  .diff { display: inline-flex; background: #fff; border-radius: 999px; padding: 4px; box-shadow: 0 4px 0 rgba(43,33,80,0.08); gap: 4px; }
  .diff button {
    border: none; background: transparent;
    font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 14px;
    color: #8a7fb8; padding: 7px 16px; border-radius: 999px; cursor: pointer; touch-action: manipulation;
  }
  .diff button.active { background: var(--blue); color: #fff; }

  .hidden { display: none !important; }

  #confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 50; }
  .confetti-piece { position: absolute; top: -40px; font-size: 26px; will-change: transform; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(115vh) rotate(540deg); opacity: 0.9; } }

  @media (prefers-reduced-motion: reduce) {
    .draw-anim { animation: none; stroke-dashoffset: 0; }
    .square.win { animation: none; }
    .confetti-piece { animation-duration: .01s !important; display: none; }
  }
</style>
</head>

<script>
(function () {
  "use strict";

  function E() { return String.fromCodePoint.apply(String, arguments); }
  var EM = {
    party:    E(0x1F389),
    robot:    E(0x1F916),
    heart:    E(0x2764, 0xFE0F),
    blue:     E(0x1F499),
    hands:    E(0x1F91D),
    star:     E(0x2B50),
    balloon:  E(0x1F388),
    sparkle:  E(0x2728),
    gstar:    E(0x1F31F),
    carousel: E(0x1F3A0),
    speaker:  E(0x1F50A),
    mute:     E(0x1F507)
  };

  var WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  var state = {
    mode: "2p",
    board: Array(9).fill(null),
    current: "X",
    over: false,
    locked: false,
    scores: { X: 0, O: 0, draw: 0 },
    soundOn: true
  };

  var el = {
    home: document.getElementById("home"),
    game: document.getElementById("game"),
    board: document.getElementById("board"),
    status: document.getElementById("status"),
    statusText: document.getElementById("statusText"),
    scoreX: document.getElementById("scoreX"),
    scoreO: document.getElementById("scoreO"),
    scoreD: document.getElementById("scoreD"),
    redName: document.getElementById("redName"),
    blueName: document.getElementById("blueName"),
    again: document.getElementById("again"),
    back: document.getElementById("back"),
    sound: document.getElementById("sound"),
    confetti: document.getElementById("confetti")
  };

  function svgX() {
    return '<svg viewBox="0 0 100 100" class="mark-x" aria-hidden="true">' +
      '<path class="mark-stroke draw-anim" d="M26 26 L74 74" />' +
      '<path class="mark-stroke draw-anim delay" d="M74 26 L26 74" />' +
      '</svg>';
  }
  function svgO() {
    return '<svg viewBox="0 0 100 100" class="mark-o" aria-hidden="true">' +
      '<circle class="mark-stroke draw-anim" cx="50" cy="50" r="32" ' +
      'style="stroke-dasharray:210;stroke-dashoffset:210" /></svg>';
  }

  function buildBoard() {
    el.board.innerHTML = "";
    for (var i = 0; i < 9; i++) {
      var b = document.createElement("button");
      b.className = "square";
      b.setAttribute("role", "gridcell");
      b.setAttribute("data-i", i);
      b.setAttribute("aria-label", "Square " + (i + 1) + ", empty");
      b.addEventListener("click", onSquare);
      el.board.appendChild(b);
    }
  }

  var actx = null;
  function ensureAudio() {
    if (!actx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) actx = new AC();
    }
    if (actx && actx.state === "suspended") actx.resume();
  }
  function tone(freq, dur, type, vol, when) {
    if (!state.soundOn || !actx) return;
    var t0 = actx.currentTime + (when || 0);
    var osc = actx.createOscillator();
    var g = actx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol || 0.18, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(actx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }
  function soundPlace(mark) { if (!state.soundOn) return; ensureAudio(); tone(mark === "X" ? 392 : 330, 0.16, "triangle", 0.2); }
  function soundWin() {
    if (!state.soundOn) return; ensureAudio();
    var notes = [523, 659, 784, 1047];
    for (var i = 0; i < notes.length; i++) tone(notes[i], 0.32, "triangle", 0.2, i * 0.11);
  }
  function soundDraw() { if (!state.soundOn) return; ensureAudio(); tone(330, 0.18, "sine", 0.16, 0); tone(247, 0.28, "sine", 0.16, 0.13); }

  function checkResult(board) {
    for (var i = 0; i < WIN_LINES.length; i++) {
      var L = WIN_LINES[i];
      var a = board[L[0]];
      if (a && a === board[L[1]] && a === board[L[2]]) return { winner: a, line: L };
    }
    if (board.indexOf(null) === -1) return { winner: "draw", line: null };
    return { winner: null, line: null };
  }

  function emptyCells(board) {
    var out = [];
    for (var i = 0; i < 9; i++) if (board[i] === null) out.push(i);
    return out;
  }

  function winningMove(board, player) {
    var cells = emptyCells(board);
    for (var k = 0; k < cells.length; k++) {
      var i = cells[k];
      board[i] = player;
      var win = checkResult(board).winner === player;
      board[i] = null;
      if (win) return i;
    }
    return null;
  }

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  // Minimax: O maximizes, X minimizes. Depth term prefers quicker wins / slower losses.
  function minimax(board, depth, isO) {
    var r = checkResult(board);
    if (r.winner === "O") return 10 - depth;
    if (r.winner === "X") return depth - 10;
    if (r.winner === "draw") return 0;
    var cells = emptyCells(board);
    var i, v, best;
    if (isO) {
      best = -Infinity;
      for (i = 0; i < cells.length; i++) {
        board[cells[i]] = "O";
        v = minimax(board, depth + 1, false);
        board[cells[i]] = null;
        if (v > best) best = v;
      }
    } else {
      best = Infinity;
      for (i = 0; i < cells.length; i++) {
        board[cells[i]] = "X";
        v = minimax(board, depth + 1, true);
        board[cells[i]] = null;
        if (v < best) best = v;
      }
    }
    return best;
  }

  function optimalMove(board) {
    var cells = emptyCells(board);
    var bestScore = -Infinity, bestMoves = [], i, v;
    for (i = 0; i < cells.length; i++) {
      board[cells[i]] = "O";
      v = minimax(board, 1, false);
      board[cells[i]] = null;
      if (v > bestScore) { bestScore = v; bestMoves = [cells[i]]; }
      else if (v === bestScore) { bestMoves.push(cells[i]); }
    }
    return pick(bestMoves);
  }

  function cpuMove() {
    var board = state.board;
    var move = winningMove(board, "O");        // 1. take a winning move
    if (move === null) move = winningMove(board, "X");  // 2. block opponent's winning move
    if (move === null) {                       // 3. otherwise 90% optimal, 10% random
      move = Math.random() < 0.9 ? optimalMove(board) : pick(emptyCells(board));
    }
    if (move === null || move === undefined) return;
    place(move);
  }

  function place(i) {
    if (state.over || state.board[i] !== null) return;
    var mark = state.current;
    state.board[i] = mark;

    var cell = el.board.children[i];
    cell.innerHTML = mark === "X" ? svgX() : svgO();
    cell.setAttribute("aria-label", "Square " + (i + 1) + ", " + (mark === "X" ? "red X" : "blue O"));
    soundPlace(mark);

    var result = checkResult(state.board);
    if (result.winner) { endGame(result); return; }

    state.current = mark === "X" ? "O" : "X";
    updateStatus();

    if (state.mode === "cpu" && state.current === "O" && !state.over) {
      lockBoard(true);
      setTimeout(function () { cpuMove(); lockBoard(false); }, 520);
    }
  }

  function onSquare(e) {
    var i = +e.currentTarget.getAttribute("data-i");
    if (state.locked || state.over || state.board[i] !== null) return;
    if (state.mode === "cpu" && state.current === "O") return;
    ensureAudio();
    place(i);
  }

  function lockBoard(on) { state.locked = on; el.board.classList.toggle("locked", on); }

  function endGame(result) {
    state.over = true;
    if (result.winner === "draw") {
      state.scores.draw++;
      setStatus("draw", "It's a tie! " + EM.hands);
      soundDraw();
    } else {
      state.scores[result.winner]++;
      for (var j = 0; j < result.line.length; j++) el.board.children[result.line[j]].classList.add("win");
      setStatus("win-" + result.winner, winnerText(result.winner));
      soundWin();
      launchConfetti();
    }
    updateScores();
  }

  function winnerText(winner) {
    if (state.mode === "cpu") {
      return winner === "X" ? (EM.party + " Alexander wins!") : (EM.robot + " Computer wins!");
    }
    return winner === "X" ? (EM.heart + " Red wins!") : (EM.blue + " Blue wins!");
  }

  function setStatus(cls, text) { el.status.className = "status " + cls; el.statusText.textContent = text; }

  function updateStatus() {
    if (state.over) return;
    var cls = state.current === "X" ? "turn-X" : "turn-O";
    var text;
    if (state.mode === "cpu") {
      text = state.current === "X" ? "Alexander's turn" : "Computer thinking...";
    } else {
      text = state.current === "X" ? ("Red's turn " + EM.heart) : ("Blue's turn " + EM.blue);
    }
    setStatus(cls, text);
  }

  function updateScores() {
    el.scoreX.textContent = state.scores.X;
    el.scoreO.textContent = state.scores.O;
    el.scoreD.textContent = state.scores.draw;
  }

  var CONFETTI = [EM.party, EM.star, EM.balloon, EM.sparkle, EM.gstar, EM.carousel];
  function launchConfetti() {
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    for (var i = 0; i < 26; i++) {
      (function () {
        var s = document.createElement("div");
        s.className = "confetti-piece";
        s.textContent = CONFETTI[Math.floor(Math.random() * CONFETTI.length)];
        s.style.left = Math.random() * 100 + "vw";
        var dur = 1.6 + Math.random() * 1.6;
        s.style.animationDuration = dur + "s";
        s.style.animationDelay = Math.random() * 0.4 + "s";
        s.style.fontSize = (20 + Math.random() * 18) + "px";
        el.confetti.appendChild(s);
        setTimeout(function () { s.remove(); }, (dur + 0.6) * 1000);
      })();
    }
  }

  function newRound() {
    state.board = Array(9).fill(null);
    state.current = "X";
    state.over = false;
    lockBoard(false);
    for (var i = 0; i < 9; i++) {
      var c = el.board.children[i];
      c.className = "square";
      c.innerHTML = "";
      c.setAttribute("aria-label", "Square " + (i + 1) + ", empty");
    }
    updateStatus();
  }

  function startMode(mode) {
    state.mode = mode;
    state.scores = { X: 0, O: 0, draw: 0 };
    updateScores();
    el.home.classList.add("hidden");
    el.game.classList.remove("hidden");
    if (mode === "cpu") {
      el.redName.textContent = "Alexander " + EM.heart;
      el.blueName.textContent = "Computer " + EM.robot;
    } else {
      el.redName.textContent = "Red " + EM.heart;
      el.blueName.textContent = "Blue " + EM.blue;
    }
    newRound();
  }

  function goHome() { el.game.classList.add("hidden"); el.home.classList.remove("hidden"); }

  Array.prototype.forEach.call(document.querySelectorAll(".mode-btn"), function (btn) {
    btn.addEventListener("click", function () { ensureAudio(); startMode(btn.getAttribute("data-mode")); });
  });

  el.again.addEventListener("click", function () { ensureAudio(); newRound(); });
  el.back.addEventListener("click", goHome);
  el.sound.addEventListener("click", function () {
    state.soundOn = !state.soundOn;
    el.sound.textContent = state.soundOn ? EM.speaker : EM.mute;
    if (state.soundOn) ensureAudio();
  });

  buildBoard();
})();
</script>
</body>
</html>
